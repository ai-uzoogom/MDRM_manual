site_name: MDRM 엔지니어 교육매뉴얼 - TRUST ME. I'M ENGINEER.

site_author: MDRM Team
site_url: https://man.uzoogom.com/



theme:
  name: material
  language: ko
  palette:
    scheme: default
    primary: blue
    accent: blue
  logo: assets/images/logo/mdrm_logo.png
  favicon: assets/images/logo/mdrm_favicon.png
  font:
    text: Pretendard
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - 🏠: index.md
  - 🧪 LAB 환경: lab/MDRM_LAB_환경_안내.md
  - 설치:
    - 학습 안내: setup/MDRM_설치_학습_안내.md
    - 솔루션 개요: setup/MDRM_솔루션_개요.md
    - 인프라:
      - ▸ 디스크 구성: setup/인프라_디스크_구성.md
      - ▸ OS 튜닝: setup/인프라_OS_튜닝.md
      - ▸ 포트 정보: setup/인프라_포트_정보.md
    - Docker:
      - ▸ Docker 설치: setup/Docker_설치_가이드.md
      - ▸ Docker 환경 설정: setup/Docker_환경_설정.md
    - Podman:
      - ▸ Podman 설치: setup/Podman_설치_가이드.md
      - ▸ Podman 환경 설정: setup/Podman_환경_설정.md
    - MDRM:
      - ▸ 설치 및 확인: setup/MDRM_설치_및_확인.md
      - ▸ 컨테이너 구성 정보: setup/MDRM_컨테이너_구성.md
      - ▸ 정지 및 종료: setup/MDRM_정지_및_종료.md
      - ▸ 시스템 관리: setup/MDRM_시스템_관리.md
      - ▸ 임시라이선스 입력: setup/MDRM_임시라이선스_입력.md
    - Agent:
        - ▸ 설치 및 등록: setup/MDRM_Agent_설치_및_등록.md
        - ▸ 자동설치: setup/MDRM_Agent_자동설치.md
        - ▸ 수동설치:
            - › 유닉스(AIX): setup/MDRM_Agent_수동설치_AIX.md
            - › 리눅스(Linux): setup/MDRM_Agent_수동설치_리눅스.md
            - › 윈도우(Windows): setup/MDRM_Agent_수동설치_윈도우.md
            - › 가져오기(Import): setup/MDRM_Agent_수동설치_가져오기.md
        - ▸ 시스템 수동등록: setup/MDRM_Agent_시스템수동등록.md
        - ▸ Agentless: setup/MDRM_Agent_Agentless.md
        - ▸ 환경 설정: setup/MDRM_Agent_환경_설정.md
  - 개요설명:
    - 학습 안내: overview/MDRM_운영_학습_안내_기본.md
    - 대시보드:
        - ▸ 개요: overview/MDRM_메뉴_대시보드.md
        - ▸ 대시보드 관리: overview/MDRM_대시보드_관리.md
        - ▸ 위젯 활용 가이드: overview/MDRM_대시보드_위젯.md
    - 시스템:
        - ▸ 개요: overview/MDRM_메뉴_시스템.md
        - ▸ 구성 및 그룹 관리: overview/MDRM_시스템_구성_관리.md
        - ▸ 시스템 등록 및 추가: overview/MDRM_시스템_등록_추가.md
        - ▸ 모니터링 및 알림: overview/MDRM_시스템_모니터링_알림.md
        - ▸ 프로그램 배포 및 작업: overview/MDRM_시스템_배포_작업.md
        - ▸ 계정 관리: overview/MDRM_시스템_계정_관리.md
    - 워크플로우:
        - ▸ 개요: overview/MDRM_메뉴_워크플로우.md
        - ▸ 데이터센터 및 그룹 관리: overview/MDRM_워크플로우_구성_관리.md
        - ▸ 프로세스 설계 및 컴포넌트: overview/MDRM_워크플로우_설계_컴포넌트.md
        - ▸ 변수 활용 및 조건 분기: overview/MDRM_워크플로우_변수_분기.md
        - ▸ 워크플로우 실행 및 모니터링: overview/MDRM_워크플로우_실행_모니터링.md
        - ▸ 관리 및 실행 리포트: overview/MDRM_워크플로우_관리_리포트.md
    - 점검작업:
        - ▸ 개요: overview/MDRM_점검작업_개요.md
        - ▸ 데이터센터 및 그룹 관리: overview/MDRM_점검작업_구성_관리.md
        - ▸ 점검 및 작업 관리: overview/MDRM_점검_작업_관리.md
        - ▸ 실행 결과 및 이력 확인: overview/MDRM_점검_실행_결과.md
        - ▸ 스케줄 및 알림: overview/MDRM_점검_스케줄_알림.md
  - 운영 및 활용:
    - 학습 안내: operation/MDRM_운영_학습_안내_심화.md
    - 자동화 제어 범위: operation/MDRM_자동화_영역.md
    - 워크플로우:
        - ▸ 유형 및 구조: operation/MDRM_워크플로우_유형.md
        - ▸ 시스템 워크플로우: operation/MDRM_워크플로우_시스템.md
        - ▸ 그룹 워크플로우: operation/MDRM_워크플로우_그룹.md
        - ▸ 시나리오 워크플로우: operation/MDRM_워크플로우_시나리오.md
    - 컴포넌트:
        - ▸ 설계 및 로직: operation/MDRM_컴포넌트_설계_로직.md
        - ▸ 실행 프로세스: operation/MDRM_컴포넌트_실행_프로세스.md
        - ▸ 주요 사용 컴포넌트: operation/MDRM_주요_컴포넌트.md
        - ▸ 템플릿 제작 가이드: operation/MDRM_컴포넌트_템플릿_제작.md
    - 점검작업:
        - ▸ 점검작업 스크립트: operation/MDRM_점검작업_스크립트.md
        - ▸ 점검작업 리스트: operation/MDRM_점검작업_리스트.md
  - 실전 실습 및 조치:
    - 학습 안내: practice/MDRM_운영_학습_안내_실전.md
    - 실습 및 장애조치:
        - ▸ 자동화 구현 체크포인트: practice/MDRM_자동화_구현_체크포인트.md
        - ▸ 실전 시나리오 실습: practice/MDRM_실전_시나리오_실습.md
        - ▸ 트러블슈팅 가이드: practice/MDRM_트러블슈팅_가이드.md
        - ▸ 교육 마무리: practice/MDRM_교육_마무리.md
  - 심화 학습:
      - MDRM:
        - ▸ 시스템 포트 변경 가이드: advanced/MDRM_포트_변경_가이드.md
        - ▸ 업그레이드 가이드: advanced/MDRM_업그레이드_가이드.md
        - ▸ 시스템 대량 등록 (Loader): advanced/MDRM_시스템_수동등록_Loader.md
        - ▸ 공인 인증서 가이드: advanced/MDRM_공인인증서_가이드.md
        - ▸ API 계정 및 원격 제어: advanced/MDRM_API_원격제어.md
        - ▸ 백업 및 복구 가이드: advanced/MDRM_백업_절차.md
      - Agent:
        - ▸ 환경 설정: advanced/MDRM_Agent_환경_설정_심화.md
        - ▸ 운영↔DR Node ID 불일치 해결: advanced/MDRM_NodeID_불일치_해결.md
      - 프로젝트:
        - ▸ 일정 관리: advanced/MDRM_구축_일정관리.md
  - 트러블슈팅:
    - 컴포넌트:
        - ▸ Grep 자기 자신 탐지: troubleshooting/MDRM_TS_컴포넌트_Grep.md
        - ▸ 인자값(Argument) 충돌: troubleshooting/MDRM_TS_컴포넌트_인자값.md
    - Agent:
        - ▸ 통신 상태 점검: troubleshooting/MDRM_TS_Agent_통신점검.md
        - ▸ 417 오류 및 Token 불일치: troubleshooting/MDRM_TS_Agent_417오류.md
    - 시스템:
        - ▸ 가져오기 사전점검 실패: troubleshooting/MDRM_TS_시스템_가져오기_실패.md


extra:
  mdrm:
    version: "4.6.8"
    full_version: "4.6.8.1"
    package_name: "mdrm468.tar.gz"
    setup_dir: "/mdrm/packages/mdrm4681"
    bin_path: "/mdrm/data/bin"
    server_ip: "10.20.33.100"
    server_port: 443
    path_pkg: "/mdrm/package"
    path_data: "/mdrm/data"
    path_engine: "/mdrm/engine"
  agent:
    version: "1.3.0"
    install_path: "/opt/gam_agent"
    port: 20080
    pkg_linux: "gam_agent.withJreX64.tar.gz"
    pkg_windows: "gam_agent.zip"
    pkg_aix: "gam_agent.tar"
  lab:
    student_count: 9
    base_ip: 55
  generator: false

plugins:
  - search:
      lang: ko
      separator: '[\s\-\.]+'
  - glightbox
  - macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
  - javascripts/extra.js

